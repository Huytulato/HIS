<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Danh mục Xã/ phường - FR_DM_Web_32</title>
<!-- Load Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#192080',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px', // Theme ROUND_EIGHT
          }
        }
      }
    }
  </script>
<style data-purpose="custom-layout-styles">
    /* Custom scrollbar for better UI */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
    
    /* Ensure table headers are bold and centered per requirements */
    th {
      text-align: center !important;
      font-weight: 700 !important;
    }
    
    /* Specific alignment for table body cells per requirements */
    .col-stt { text-align: center; }
    .col-data { text-align: left; }
    .col-actions { text-align: left; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 antialiased min-h-screen">
<div class="container mx-auto p-6 max-w-7xl">
<!-- BEGIN: Header Section -->
<header class="mb-6">
<h1 class="text-2xl font-bold text-primary" data-purpose="page-title">
        Danh mục Xã/ phường
      </h1>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Search and Filter Bar -->
<section class="bg-white p-6 rounded-custom shadow-sm border border-gray-200 mb-6" data-purpose="search-filter-container">
<form class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 items-end">
<!-- Mã xã/ phường Input -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-gray-700" for="ma-xa">Mã xã/ phường</label>
<input class="form-input w-full border-gray-300 rounded-custom focus:border-primary focus:ring-primary text-sm" id="ma-xa" placeholder="Nhập mã..." type="text"/>
</div>
<!-- Tên Xã/ phường Input -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-gray-700" for="ten-xa">Tên Xã/ phường</label>
<input class="form-input w-full border-gray-300 rounded-custom focus:border-primary focus:ring-primary text-sm" id="ten-xa" placeholder="Nhập tên..." type="text"/>
</div>
<!-- Action Buttons -->
<div class="md:col-span-1 lg:col-span-2 flex flex-wrap gap-2 mt-2 md:mt-0">
<button class="px-5 py-2 bg-primary text-white rounded-custom hover:bg-opacity-90 transition-all text-sm font-medium flex items-center gap-2" type="button">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
            Tìm kiếm
          </button>
<button class="px-5 py-2 bg-blue-600 text-white rounded-custom hover:bg-blue-700 transition-all text-sm font-medium flex items-center gap-2" data-purpose="import-button" type="button">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
            Import file
          </button>
<button class="px-5 py-2 border border-gray-300 bg-white text-gray-700 rounded-custom hover:bg-gray-50 transition-all text-sm font-medium" type="button">
            Thoát
          </button>
</div>
</form>
</section>
<!-- END: Search and Filter Bar -->
<!-- BEGIN: Data Table -->
<section class="bg-white rounded-custom shadow-sm border border-gray-200 overflow-hidden" data-purpose="data-table-container">
<div class="overflow-x-auto">
<table class="min-w-full divide-y divide-gray-200" id="xa-phuong-table">
<thead class="bg-gray-50">
<tr>
<th class="px-4 py-3 text-xs font-bold text-gray-600 uppercase tracking-wider border-r border-gray-200" scope="col">
                STT
              </th>
<th class="px-4 py-3 text-xs font-bold text-gray-600 uppercase tracking-wider border-r border-gray-200" scope="col">
                Mã xã/ phường
              </th>
<th class="px-4 py-3 text-xs font-bold text-gray-600 uppercase tracking-wider border-r border-gray-200" scope="col">
                Tên Xã/ phường
              </th>
<th class="px-4 py-3 text-xs font-bold text-gray-600 uppercase tracking-wider border-r border-gray-200" scope="col">
                Quận/ Huyện
              </th>
<th class="px-4 py-3 text-xs font-bold text-gray-600 uppercase tracking-wider" scope="col">
                Tác vụ
              </th>
</tr>
</thead>
<tbody class="bg-white divide-y divide-gray-200 text-sm text-gray-700">
<!-- Row 1 -->
<tr>
<td class="px-4 py-3 col-stt border-r border-gray-100">1</td>
<td class="px-4 py-3 col-data border-r border-gray-100 font-medium">XP001</td>
<td class="px-4 py-3 col-data border-r border-gray-100">Phường Bến Nghé</td>
<td class="px-4 py-3 col-data border-r border-gray-100">Quận 1</td>
<td class="px-4 py-3 col-actions flex gap-3">
<button class="text-blue-600 hover:text-blue-800 transition-colors" title="Cập nhật">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button class="text-red-600 hover:text-red-800 transition-colors" title="Xóa">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</td>
</tr>
<!-- Row 2 -->
<tr class="bg-gray-50/50">
<td class="px-4 py-3 col-stt border-r border-gray-100">2</td>
<td class="px-4 py-3 col-data border-r border-gray-100 font-medium">XP002</td>
<td class="px-4 py-3 col-data border-r border-gray-100">Phường Bến Thành</td>
<td class="px-4 py-3 col-data border-r border-gray-100">Quận 1</td>
<td class="px-4 py-3 col-actions flex gap-3">
<button class="text-blue-600 hover:text-blue-800 transition-colors" title="Cập nhật">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button class="text-red-600 hover:text-red-800 transition-colors" title="Xóa">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</td>
</tr>
<!-- Rows 3-10 omitted for brevity in static generation, but pattern remains consistent -->
<!-- Generating 8 more identical structure rows to satisfy requirements -->
<script data-purpose="table-row-generator">
              const tbody = document.querySelector('tbody');
              const districts = ["Quận 1", "Quận 3", "Quận Bình Thạnh", "Quận Phú Nhuận"];
              const names = ["Cầu Kho", "Đa Kao", "Tân Định", "Cô Giang", "Võ Thị Sáu", "Hàng Xanh", "Phường 1", "Phường 2"];
              
              for (let i = 3; i <= 10; i++) {
                const row = document.createElement('tr');
                if (i % 2 === 0) row.className = 'bg-gray-50/50';
                row.innerHTML = `
                  <td class="px-4 py-3 col-stt border-r border-gray-100">${i}</td>
                  <td class="px-4 py-3 col-data border-r border-gray-100 font-medium">XP00${i}</td>
                  <td class="px-4 py-3 col-data border-r border-gray-100">Phường ${names[i-3] || 'Tên Xã'}</td>
                  <td class="px-4 py-3 col-data border-r border-gray-100">${districts[i % 4]}</td>
                  <td class="px-4 py-3 col-actions flex gap-3">
                    <button class="text-blue-600 hover:text-blue-800 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button>
                    <button class="text-red-600 hover:text-red-800 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                  </td>
                `;
                tbody.appendChild(row);
              }
            </script>
</tbody>
</table>
</div>
<!-- BEGIN: Pagination Footer -->
<footer class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4" data-purpose="table-footer">
<div class="flex items-center gap-4">
<div class="flex items-center gap-2">
<span class="text-sm text-gray-600">Hiển thị</span>
<select class="form-select text-sm border-gray-300 rounded-custom focus:ring-primary focus:border-primary py-1" data-purpose="rows-per-page">
<option value="5">5</option>
<option selected="" value="10">10</option>
<option value="15">15</option>
<option value="20">20</option>
<option value="50">50</option>
<option value="100">100</option>
</select>
<span class="text-sm text-gray-600">bản ghi/trang</span>
</div>
<span class="text-sm font-medium text-gray-700 bg-gray-200 px-3 py-1 rounded-full" data-purpose="total-records">
            Tổng số bản ghi: 500
          </span>
</div>
<nav aria-label="Pagination" class="flex items-center space-x-1">
<button class="p-2 rounded-custom hover:bg-gray-200 text-gray-500 disabled:opacity-50" disabled="">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="px-3 py-1 text-sm rounded-custom bg-primary text-white">1</button>
<button class="px-3 py-1 text-sm rounded-custom hover:bg-gray-200 text-gray-700">2</button>
<button class="px-3 py-1 text-sm rounded-custom hover:bg-gray-200 text-gray-700">3</button>
<span class="px-2 text-gray-400">...</span>
<button class="px-3 py-1 text-sm rounded-custom hover:bg-gray-200 text-gray-700">50</button>
<button class="p-2 rounded-custom hover:bg-gray-200 text-gray-500">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</nav>
</footer>
<!-- END: Pagination Footer -->
</section>
<!-- END: Data Table -->
</div>
<script data-purpose="interactive-elements">
    // Mock interaction for the "Thoát" button
    document.querySelector('button:contains("Thoát")')?.addEventListener('click', () => {
      if(confirm('Bạn có chắc chắn muốn thoát?')) {
        window.history.back();
      }
    });

    // Handle rows per page selection behavior
    const pageSelect = document.querySelector('[data-purpose="rows-per-page"]');
    pageSelect?.addEventListener('change', (e) => {
      console.log(`System refreshing to display ${e.target.value} records...`);
      // Simulate reload
      document.body.style.opacity = '0.5';
      setTimeout(() => { document.body.style.opacity = '1'; }, 300);
    });
  </script>
</body></html>
