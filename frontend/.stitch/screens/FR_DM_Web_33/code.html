<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Danh mục Tỉnh/ Thành phố</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#192080',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styles">
    body {
      background-color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      background-color: #192080;
      color: white;
      transition: opacity 0.2s;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .table-header {
      background-color: #f1f5f9;
    }
  </style>
</head>
<body class="p-6">
<!-- BEGIN: MainContainer -->
<main class="max-w-7xl mx-auto bg-white shadow-sm border border-gray-200 rounded-custom overflow-hidden">
<!-- BEGIN: HeaderSection -->
<header class="border-b border-gray-200 px-6 py-4 flex justify-between items-center bg-white" data-purpose="header">
<h1 class="text-xl font-bold text-gray-800">Danh mục Tỉnh/ Thành phố</h1>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: SearchBar -->
<section class="p-6 border-b border-gray-100 bg-gray-50/30" data-purpose="search-filters">
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
<!-- Mã Tỉnh/ TP Textbox -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700" for="province-code">Mã Tỉnh/ TP</label>
<input class="form-input block w-full border-gray-300 rounded-custom text-sm focus:ring-primary focus:border-primary" id="province-code" placeholder="Nhập mã..." type="text"/>
</div>
<!-- Tên Tỉnh/ TP Auto complete -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700" for="province-name">Tên Tỉnh/ TP</label>
<div class="relative">
<input class="form-input block w-full border-gray-300 rounded-custom text-sm focus:ring-primary focus:border-primary" id="province-name" placeholder="Tìm kiếm tên..." type="text"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
<svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="md:col-span-2 flex flex-wrap gap-2 justify-end">
<button class="px-4 py-2 border border-gray-300 rounded-custom text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 flex items-center gap-2" type="button">
            Tìm kiếm
          </button>
<button class="btn-primary px-4 py-2 rounded-custom text-sm font-medium flex items-center gap-2" type="button">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
            Import file
          </button>
<button class="px-4 py-2 border border-red-200 text-red-600 rounded-custom text-sm font-medium bg-white hover:bg-red-50" type="button">
            Thoát
          </button>
</div>
</div>
</section>
<!-- END: SearchBar -->
<!-- BEGIN: DataTable -->
<section class="overflow-x-auto" data-purpose="data-display">
<table class="w-full text-sm text-left border-collapse">
<thead class="table-header text-gray-700 uppercase text-xs font-bold border-b border-gray-200">
<tr>
<th class="px-4 py-3 text-center w-16" scope="col">STT</th>
<th class="px-6 py-3" scope="col">Mã Tỉnh/ TP</th>
<th class="px-6 py-3" scope="col">Tên Tỉnh/ TP</th>
<th class="px-6 py-3 text-center w-32" scope="col">Tác vụ</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-200">
<!-- Sample Rows (Generating 10 rows for visual fidelity) -->
<tr class="hover:bg-gray-50 transition-colors">
<td class="px-4 py-4 text-center">1</td>
<td class="px-6 py-4 font-medium text-gray-900">01</td>
<td class="px-6 py-4">Thành phố Hà Nội</td>
<td class="px-6 py-4 flex justify-center gap-4">
<button class="text-blue-600 hover:text-blue-800" title="Update">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="text-red-600 hover:text-red-800" title="Delete">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</td>
</tr>
<tr class="hover:bg-gray-50 transition-colors">
<td class="px-4 py-4 text-center">2</td>
<td class="px-6 py-4 font-medium text-gray-900">79</td>
<td class="px-6 py-4">Thành phố Hồ Chí Minh</td>
<td class="px-6 py-4 flex justify-center gap-4">
<button class="text-blue-600 hover:text-blue-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<button class="text-red-600 hover:text-red-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
</td>
</tr>
<!-- Repeat structure for 10 rows -->
<tr class="hover:bg-gray-50">
<td class="px-4 py-4 text-center text-gray-500">3</td>
<td class="px-6 py-4 font-medium text-gray-900">48</td>
<td class="px-6 py-4">Thành phố Đà Nẵng</td>
<td class="px-6 py-4 flex justify-center gap-4">
<button class="text-blue-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<button class="text-red-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
</td>
</tr>
<tr class="hover:bg-gray-50">
<td class="px-4 py-4 text-center text-gray-500">...</td>
<td class="px-6 py-4 font-medium text-gray-900">...</td>
<td class="px-6 py-4 text-gray-400 italic">Dữ liệu mẫu trang 1</td>
<td class="px-6 py-4 flex justify-center gap-4">
<button class="text-gray-300 cursor-not-allowed"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<button class="text-gray-300 cursor-not-allowed"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
</td>
</tr>
<!-- Rows would normally be populated via template loop -->
</tbody>
</table>
</section>
<!-- END: DataTable -->
<!-- BEGIN: PaginationFooter -->
<footer class="px-6 py-4 bg-white border-t border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4" data-purpose="pagination">
<div class="flex items-center gap-4 text-sm text-gray-600">
<div class="flex items-center gap-2">
<span>Hiển thị</span>
<select class="form-select border-gray-300 rounded-custom py-1 text-sm focus:ring-primary focus:border-primary">
<option value="5">5</option>
<option selected="" value="10">10</option>
<option value="15">15</option>
<option value="20">20</option>
<option value="50">50</option>
<option value="100">100</option>
</select>
<span>bản ghi/trang</span>
</div>
<div class="border-l border-gray-300 pl-4">
          Tổng số bản ghi: <span class="font-semibold text-gray-900">63</span>
</div>
</div>
<nav aria-label="Pagination" class="flex items-center -space-x-px">
<button class="px-2 py-2 rounded-l-custom border border-gray-300 bg-white text-gray-500 hover:bg-gray-50">
<span class="sr-only">Previous</span>
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="px-4 py-2 border border-gray-300 bg-primary text-white text-sm font-medium">1</button>
<button class="px-4 py-2 border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 text-sm font-medium">2</button>
<button class="px-4 py-2 border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 text-sm font-medium">3</button>
<span class="px-4 py-2 border border-gray-300 bg-white text-gray-700 text-sm font-medium">...</span>
<button class="px-4 py-2 border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 text-sm font-medium">7</button>
<button class="px-2 py-2 rounded-r-custom border border-gray-300 bg-white text-gray-500 hover:bg-gray-50">
<span class="sr-only">Next</span>
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</nav>
</footer>
<!-- END: PaginationFooter -->
</main>
<!-- END: MainContainer -->
</body></html>
